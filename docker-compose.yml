services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Mặc định FinMom production; ghi đè bằng VITE_API_BASE_URL trong .env nếu cần
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://finmom-production.up.railway.app}
        VITE_RAG_UPLOAD_FIELD: ${VITE_RAG_UPLOAD_FIELD:-file}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://finmom-production.up.railway.app}
      VITE_RAG_UPLOAD_FIELD: ${VITE_RAG_UPLOAD_FIELD:-file}
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
