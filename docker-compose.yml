services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL backend (vd: https://xxxx.ngrok-free.app) — truyền khi build để app gọi API đúng
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_RAG_UPLOAD_FIELD: ${VITE_RAG_UPLOAD_FIELD:-file}
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
